apiVersion: v1
kind: ConfigMap
metadata:
  name: ds4-v100-appliance-config
  namespace: llm
data:
  appliance.env: |
    DS4_V100_BIN=./tools/ds4-v100-replay
    DS4_V100_MODEL=/models/DSv4-Flash-256e-fixed.gguf
    DS4_V100_MTP_MODEL=/models/DeepSeek-V4-Flash-MTP-Q4K-Q8_0-F32.gguf
    DS4_V100_PACK_INDEX=docs/sprints/drafts/SPRINT-003-PACK-INDEX.tsv
    DS4_V100_CTX=1048576
    DS4_V100_SLOTS=4
    DS4_V100_ACTIVE_MICROBATCH=4
    DS4_V100_QUEUE_POLICY=sequential
    DS4_V100_TOKENS=16
    DS4_V100_ASYNC_PIPELINE_MODE=auto
    DS4_V100_ENABLE_OUTPUT_HEAD_BATCH=0
    DS4_V100_HOST=127.0.0.1
    DS4_V100_PORT=18080
    DS4_V100_CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
    DS4_V100_REQUIRE_GPUS=8
    DS4_V100_RESERVE_MIB=4096
    DS4_V100_MAX_REQUESTS=0
    DS4_V100_LOG_DIR=logs/v100-appliance
    DS4_V100_SERVE_MODE=base
    DS4_V100_MTP_SERVING=off
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds4-v100-appliance
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds4-v100-appliance
  template:
    metadata:
      labels:
        app: ds4-v100-appliance
    spec:
      nodeSelector:
        kubernetes.io/hostname: gpu-01
      containers:
        - name: appliance
          image: nvidia/cuda:12.4.1-devel-ubuntu22.04
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/ds4
          command: ["/bin/bash", "-lc"]
          args:
            - exec ./tools/ds4-v100-run-appliance.sh --env /etc/ds4-v100/appliance.env
          ports:
            - name: http
              containerPort: 18080
          resources:
            limits:
              nvidia.com/gpu: "8"
          readinessProbe:
            exec:
              command: ["/bin/bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/18080 && printf 'GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3 && grep -q '\"status\":\"ok\"' <&3"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["/bin/bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/18080 && printf 'GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3 && grep -q '\"status\":\"ok\"' <&3"]
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: workspace
              mountPath: /workspace/ds4
            - name: config
              mountPath: /etc/ds4-v100
              readOnly: true
      volumes:
        - name: models
          hostPath:
            path: /models
            type: Directory
        - name: workspace
          hostPath:
            path: /srv/dev/ds4
            type: Directory
        - name: config
          configMap:
            name: ds4-v100-appliance-config
---
apiVersion: v1
kind: Service
metadata:
  name: ds4-v100-appliance
  namespace: llm
spec:
  type: ClusterIP
  selector:
    app: ds4-v100-appliance
  ports:
    - name: http
      port: 18080
      targetPort: http
